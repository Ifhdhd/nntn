<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Auto Play Drama</title>
</head>
<body>

<h2>Auto Play 15 Detik</h2>

<video id="player" width="600" controls autoplay></video>

<script>
let currentEp = 1;

const TOKEN = "USNQclRtU2ZQJA49DzIHYglnBGFcbF1tVmcAfQ9xBiJSeQA6UDEHblYxW2IMMFo9CWEDZA49UWIHeA";
const DEVICE = "528b6cae874516ba";

async function playEpisode(ep) {
  const formData = new FormData();
  formData.append("id", "7027");
  formData.append("episode", ep);

  // ⚠️ sementara pakai yang valid dari request lu
  formData.append("app_key", "android_v1");
  formData.append("timestamp", "1778786048");
  formData.append("random_str", "6F6E2TyLH4");
  formData.append("sign_str", "495BFD2C7CA8FA45B5429998D5C1ED13");

  const res = await fetch("https://api.buzztv.me/mobile.short/play", {
    method: "POST",
    body: formData,
    headers: {
      "token": TOKEN,
      "device": DEVICE
    }
  });

  const data = await res.json();
  return data;
}

async function start() {
  const player = document.getElementById("player");

  setInterval(async () => {
    console.log("Play episode:", currentEp);

    const data = await playEpisode(currentEp);

    if (data?.res?.play_url) {
      const url = data.res.play_url["720"];
      player.src = url;
      player.play();
    } else {
      console.log("Gagal ambil video");
    }

    currentEp++;
  }, 15000);
}

start();
</script>

</body>
</html>
